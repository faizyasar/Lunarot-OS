  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element  -  warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags  -  manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames  -  from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below  -  so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document  -  a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts  -  file://  -  everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe)  -  location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match  -  accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative  -  never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate  -  a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor')  -  an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent  -  the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs  - 
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here  -  they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin  -  blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec  -  re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page  -  from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"cdfec7d8-6780-4748-b8aa-e7cf71631777\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  @keyframes skeleton-breath { 0%,100%{ transform:scale(1); opacity:.9;} 50%{ transform:scale(1.03); opacity:1;} }\n  @keyframes card-pulse { 0%,100%{ opacity:.35;} 50%{ opacity:.85;} }\n  @keyframes shake-anim { 0%,100%{ transform:translate(0,0);} 20%{ transform:translate(-3px,2px);} 40%{ transform:translate(3px,-2px);} 60%{ transform:translate(-2px,-3px);} 80%{ transform:translate(2px,3px);} }\n  @keyframes fade-in { from{ opacity:0;} to{ opacity:1;} }\n  @keyframes hand-cringe { 0%{ filter:brightness(1) saturate(1); transform:scale(1);} 25%{ filter:brightness(1.6) saturate(2.4) sepia(1) hue-rotate(-40deg) drop-shadow(0 0 10px rgba(255,30,30,0.9)); transform:scale(0.92) translateY(6px);} 60%{ filter:brightness(1.2) saturate(1.6) sepia(0.4) hue-rotate(-40deg); transform:scale(0.97) translateY(3px);} 100%{ filter:brightness(1) saturate(1); transform:scale(1);} }\n  body { margin:0; }\n  a { color:#e3b341; }\n  a:hover { color:#f5cf6b; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div ref=\"{{ setRootRef }}\" style=\"position:relative;width:100%;min-height:100vh;background:radial-gradient(circle at 50% 40%, #0e0d0c 0%, #000000 70%);color:#cfc9c0;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;overflow:hidden;animation:{{ shakeAnimStyle }};box-sizing:border-box;\">\n\n  <header style=\"width:100%;display:flex;justify-content:space-between;align-items:center;padding:14px 20px;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#7a7268;border-bottom:1px solid rgba(255,255,255,0.06);box-sizing:border-box;\">\n    <div style=\"display:flex;gap:16px;align-items:center;\">\n      <span style=\"color:#a89f92;\">beads: {{ beads }}<\u002Fspan>\n      <span style=\"color:#ffffff;\">score: {{ score }}<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1;text-align:center;padding:0 12px;color:#8a8074;font-size:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ message }}<\u002Fdiv>\n    <button sc-camel-on-click=\"{{ restart }}\" style=\"background:none;border:none;color:#665a4c;font-family:inherit;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;padding:4px 0;\">restart<\u002Fbutton>\n  <\u002Fheader>\n\n  <main style=\"display:flex;flex-direction:column;align-items:center;padding:24px 16px 40px;\">\n    <div style=\"position:relative;width:92vw;max-width:460px;aspect-ratio:480/680;\">\n\n      <div style=\"position:absolute;inset:0;transform-origin:50% 50%;animation:skeleton-breath 10s ease-in-out infinite;z-index:1;\">\n        <img src=\"b9c94007-272d-4313-9fcf-eb2d66419e3e\" alt=\"skeleton\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;pointer-events:none;user-select:none;filter:{{ skeletonFilter }};\">\n\n        <div style=\"position: absolute; left: 135px; top: 45.5px; width: 12%; aspect-ratio: 14/34; transform: translate(-50%,-62%) scale({{ flameScale }}); opacity: {{ flameOpacity }}; transition: transform 1.4s ease, opacity 1.4s ease; pointer-events: none;\" data-om-label=\"Flameleft\">\n          <canvas ref=\"{{ setFireLeftRef }}\" width=\"14\" height=\"34\" style=\"width:100%;height:100%;image-rendering:pixelated;display:block;filter:drop-shadow(0 0 3px rgba(255,150,50,0.75)) drop-shadow(0 0 6px rgba(255,100,20,0.45));\"><\u002Fcanvas>\n        <\u002Fdiv>\n        <div style=\"position: absolute; left: 267px; top: 46px; width: 12%; aspect-ratio: 14/34; transform: translate(-50%,-62%) scale({{ flameScale }}); opacity: {{ flameOpacity }}; transition: transform 1.4s ease, opacity 1.4s ease; pointer-events: none;\" data-om-label=\"Flameright\">\n          <canvas ref=\"{{ setFireRightRef }}\" width=\"14\" height=\"34\" style=\"width:100%;height:100%;image-rendering:pixelated;display:block;filter:drop-shadow(0 0 3px rgba(255,150,50,0.75)) drop-shadow(0 0 6px rgba(255,100,20,0.45));\"><\u002Fcanvas>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"position:absolute;inset:-6% -16% -4% -16%;z-index:3;display:flex;justify-content:space-between;pointer-events:none;\">\n        <div ref=\"{{ setLeftHandRef }}\" style=\"width:32%;display:flex;align-items:flex-end;transform-origin:bottom left;animation:{{ handFlashAnim }};\">\n          <img src=\"580b4c2e-5453-434a-95d8-dde016378132\" alt=\"\" style=\"width:100%;height:auto;display:block;filter:drop-shadow(0 0 10px rgba(0,0,0,0.85));\">\n        <\u002Fdiv>\n        <div ref=\"{{ setRightHandRef }}\" style=\"width:32%;display:flex;align-items:flex-end;justify-content:flex-end;transform-origin:bottom right;animation:{{ handFlashAnim }};\">\n          <img src=\"580b4c2e-5453-434a-95d8-dde016378132\" alt=\"\" style=\"width:100%;height:auto;display:block;transform:scaleX(-1);filter:drop-shadow(0 0 10px rgba(0,0,0,0.85));\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <canvas ref=\"{{ setBoardRef }}\" sc-camel-on-pointer-down=\"{{ handlePointerDown }}\" style=\"position:absolute;inset:0;width:100%;height:100%;z-index:4;cursor:{{ boardCursor }};touch-action:none;\"><\u002Fcanvas>\n\n      <sc-if value=\"{{ hasActiveCard }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.55);animation:fade-in .3s ease forwards;\">\n          <div style=\"font-size:8px;letter-spacing:0.3em;color:rgba(255,255,255,0.5);text-transform:uppercase;margin-bottom:10px;\">drew<\u002Fdiv>\n          <div sc-camel-on-click=\"{{ handleUnravel }}\" style=\"width:132px;height:196px;position:relative;cursor:pointer;transform:{{ cardTransform }};opacity:{{ cardOpacity }};transition:transform .7s ease, opacity .7s ease;box-shadow:0 10px 30px rgba(0,0,0,0.8);\">\n            <sc-if value=\"{{ isRevealedActive }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"position:absolute;inset:0;background:linear-gradient(160deg,#1a1712,#0c0a08);border:1px solid rgba(255,255,255,0.14);border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;box-sizing:border-box;transform:{{ cardFlipTransform }};\">\n                <div style=\"position:absolute;top:8px;left:10px;font-size:9px;color:rgba(255,255,255,0.55);letter-spacing:0.1em;\">{{ activeCardNum }}<\u002Fdiv>\n                <div style=\"font-size:44px;margin:6px 0;color:#cfc9c0;filter:drop-shadow(0 0 10px rgba(255,255,255,0.2));\">{{ activeCardGlyph }}<\u002Fdiv>\n                <div style=\"font-size:10px;text-align:center;font-weight:700;letter-spacing:0.08em;color:#fff;\">{{ activeCardName }}<\u002Fdiv>\n                <div style=\"font-size:8px;color:rgba(255,255,255,0.6);font-style:italic;letter-spacing:0.1em;margin-top:4px;height:10px;\">{{ activeCardRevTag }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ isRevealedActive }}\" hint-placeholder-val=\"{{ true }}\">\n            <\u002Fsc-if>\n            <div style=\"position:absolute;inset:0;background:linear-gradient(160deg,#221d17,#100d0a);border:1px solid rgba(255,255,255,0.1);border-radius:3px;display:{{ cardBackDisplay }};align-items:center;justify-content:center;\">\n              <div style=\"width:70%;height:70%;border:1px dashed rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;\">\n                <span style=\"font-size:9px;letter-spacing:0.3em;color:rgba(255,255,255,0.3);\">UNRAVEL<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px;font-size:8px;letter-spacing:0.15em;color:rgba(255,255,255,0.4);animation:card-pulse 1.6s ease-in-out infinite;\">{{ cardHint }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ gameOver }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;inset:0;z-index:30;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:20px;box-sizing:border-box;animation:fade-in .6s ease forwards;\">\n          <div style=\"font-size:26px;letter-spacing:0.35em;color:#c0392b;\">GAME OVER<\u002Fdiv>\n          <div style=\"font-size:9px;letter-spacing:0.2em;color:#a89f92;text-transform:uppercase;\">the conduit runs dry<\u002Fdiv>\n          <div style=\"font-size:11px;color:#fff;margin-top:8px;\">final score: {{ score }}<\u002Fdiv>\n          <div style=\"font-size:9px;color:#8a8074;\">{{ drawnCardsCount }} cards drawn<\u002Fdiv>\n          <div style=\"display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:280px;margin-top:6px;\">\n            <sc-for list=\"{{ drawnCards }}\" as=\"card\" hint-placeholder-count=\"0\">\n              <div style=\"font-size:16px;padding:4px 6px;border:1px solid rgba(255,255,255,0.15);border-radius:2px;color:#cfc9c0;\">{{ card.glyph }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ restart }}\" style=\"margin-top:16px;background:none;border:1px solid rgba(255,255,255,0.3);color:#cfc9c0;font-family:inherit;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;padding:10px 22px;cursor:pointer;\">restart<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:460px;margin-top:18px;\">\n      <sc-for list=\"{{ drawnCards }}\" as=\"card\" hint-placeholder-count=\"0\">\n        <div style=\"width:34px;height:50px;border:1px solid rgba(255,255,255,0.12);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:15px;background:rgba(255,255,255,0.03);color:{{ card.dimColor }};\" title=\"{{ card.name }}\">{{ card.glyph }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;startingBeads&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:10,&quot;min&quot;:3,&quot;max&quot;:15,&quot;step&quot;:1,&quot;tsType&quot;:&quot;number&quot;},&quot;flameCapBeads&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:12,&quot;min&quot;:6,&quot;max&quot;:25,&quot;step&quot;:1,&quot;tsType&quot;:&quot;number&quot;}}\">\nconst SUITS = [\n  { key: \"cups\", num: \"♥\", glyph: \"♥\", tradition: \"water\" },\n  { key: \"wands\", num: \"🔥\", glyph: \"🔥\", tradition: \"fire\" },\n  { key: \"pentacles\", num: \"◈\", glyph: \"◈\", tradition: \"earth\" },\n  { key: \"swords\", num: \"⚔\", glyph: \"⚔\", tradition: \"air\" },\n];\nconst RANKS = [\"Ace\", \"II\", \"III\", \"IV\", \"V\", \"VI\", \"VII\", \"VIII\"];\nconst MAJORS = [\n  { name: \"The Sun\", glyph: \"✧\" },\n  { name: \"The Star\", glyph: \"✦\" },\n  { name: \"The World\", glyph: \"✺\" },\n  { name: \"Wheel of Fortune\", glyph: \"☸\" },\n  { name: \"The Tower\", glyph: \"▲\" },\n  { name: \"The Devil\", glyph: \"◭\" },\n  { name: \"Death\", glyph: \"☠\" },\n];\nfunction buildDeck() {\n  const deck = [];\n  SUITS.forEach((s) => {\n    RANKS.forEach((r) => {\n      deck.push({ name: `${r} of ${s.key[0].toUpperCase()}${s.key.slice(1)}`, num: `${r} ${s.num}`, glyph: s.glyph, tradition: s.tradition, major: false });\n    });\n  });\n  MAJORS.forEach((m) => deck.push({ name: m.name, num: \"0\", glyph: m.glyph, tradition: \"cosmos\", major: true }));\n  return deck;\n}\nconst DECK = buildDeck();\n\nfunction lerp(a, b, t) { return a + (b - a) * t; }\nfunction clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }\n\nfunction buildPalette(mode) {\n  // 6-stop ramp: near-black base -> deep red -> ember -> orange mid -> yellow -> white-hot core.\n  const bands =\n    mode === \"curse\" ? [\"#1a0000\", \"#4a0808\", \"#8f0f0f\", \"#c9223a\", \"#e8452b\", \"#ffd8c2\"] :\n    mode === \"buff\" ? [\"#001210\", \"#052b25\", \"#0a5c4c\", \"#0f8f6f\", \"#4fe0b8\", \"#eafff6\"] :\n    [\"#140400\", \"#4a1200\", \"#7a1f00\", \"#c9490f\", \"#f0a020\", \"#fff2b0\"];\n  const stops = [\"rgba(0,0,0,0)\"];\n  for (let i = 1; i < 40; i++) {\n    const band = Math.min(bands.length - 1, Math.floor((i / 39) * bands.length));\n    stops.push(bands[band]);\n  }\n  return stops;\n}\nconst BAYER4 = [[0, 8, 2, 10], [12, 4, 14, 6], [3, 11, 1, 9], [15, 7, 13, 5]];\nconst KABBALIST_GLYPHS = [\"א\", \"ל\", \"ם\", \"ת\", \"ש\", \"ה\", \"✡\", \"◬\"];\nconst PALETTES = { fire: buildPalette(\"fire\"), buff: buildPalette(\"buff\"), curse: buildPalette(\"curse\") };\n\nfunction flameHalfWidth(rLocal, flameRows, mid) {\n  const tipRows = 1; // short, sharp point  -  only the very first row stays needle-thin\n  let hw;\n  if (rLocal < tipRows) {\n    hw = rLocal < tipRows - 1 ? 0 : 1;\n  } else {\n    const t2 = (rLocal - tipRows) / (flameRows - 1 - tipRows);\n    hw = Math.round(Math.pow(t2, 1.1) * mid);\n  }\n  const fromBottom = flameRows - 1 - rLocal;\n  if (fromBottom === 0) hw = Math.max(0, hw - 4); // rounded bottom: curve inward at the base\n  else if (fromBottom === 1) hw = Math.max(0, hw - 3);\n  else if (fromBottom === 2) hw = Math.max(0, hw - 2);\n  else if (fromBottom === 3) hw = Math.max(0, hw - 1);\n  if (rLocal === 0) hw = 0;\n  return hw;\n}\nfunction buildFlameBuffer(buf, FW, FH, flameRows, skyRows, sourceVal, swayPhase) {\n  const mid = (FW - 1) / 2;\n  for (let row = 0; row < FH; row++) {\n    const rLocal = row - skyRows;\n    for (let x = 0; x < FW; x++) {\n      let v = 0;\n      if (rLocal >= 0 && sourceVal > 0) {\n        const t = rLocal / (flameRows - 1); // 0 = tip, 1 = base\n        const hw = flameHalfWidth(rLocal, flameRows, mid);\n        // Asymmetric lean: the tip sways independently of the grounded base (never lockstep).\n        const sway = Math.sin(swayPhase + t * 1.6) * (1 - t) * 1.3;\n        const lit = hw <= 0 ? (x === Math.round(mid + sway)) : (Math.abs(x - mid - sway) <= hw + 0.001);\n        if (lit) {\n          const base = lerp(sourceVal * 0.42, sourceVal, t);\n          v = Math.max(0, Math.round(base - Math.random() * 6));\n        }\n      }\n      buf[row * FW + x] = v;\n    }\n  }\n  // Ash bed grounding the flame at its fuel source.\n  const baseRow = FH - 1;\n  buf[baseRow * FW + Math.round(mid - 1)] = buf[baseRow * FW + Math.round(mid - 1)] > 0 ? 1 : 0;\n  buf[baseRow * FW + Math.round(mid + 1)] = buf[baseRow * FW + Math.round(mid + 1)] > 0 ? 1 : 0;\n}\nfunction updateParticles(list, spawnFn, spawnChance) {\n  if (Math.random() < spawnChance) list.push(spawnFn());\n  for (let i = list.length - 1; i >= 0; i--) {\n    const p = list[i];\n    p.x += p.vx; p.y += p.vy; p.life--;\n    if (p.rot !== undefined) p.rot += p.vrot;\n    p.alpha = Math.max(0, p.life / p.maxLife);\n    if (p.life <= 0 || p.y < -6 || p.y > 60) list.splice(i, 1);\n  }\n}\n\nclass Component extends DCLogic {\n  state = {\n    beads: (this.props && this.props.startingBeads) || 5,\n    score: 0,\n    message: \"sacred conduit primed // tap the board to drop a bead\",\n    drawnCards: [],\n    activeCard: null,\n    revealedActive: false,\n    flyState: \"none\",\n    gameOver: false,\n    eyeMode: \"normal\",\n    shaking: false,\n    handHit: false,\n  };\n\n  DESIGN_W = 480;\n  DESIGN_H = 680;\n  WALL = 14;\n  playTop = 26;\n  gates = [\n    { label: \"VOID\", color: \"#5b6472\" },\n    { label: \"CUPS\", color: \"#38bdf8\" },\n    { label: \"WANDS\", color: \"#ef4444\" },\n    { label: \"COSMOS\", color: \"#e3b341\" },\n    { label: \"EARTH\", color: \"#10b981\" },\n    { label: \"AIR\", color: \"#a78bfa\" },\n    { label: \"VOID\", color: \"#5b6472\" },\n  ];\n  balls = [];\n  pegs = [];\n  particles = [];\n  FW = 14;\n  FLAME_ROWS = 24;\n  SKY_ROWS = 10;\n  FH = 34;\n  fireFrameSkip = 0;\n  fireBufL = new Uint8Array(this.FW * this.FH);\n  fireBufR = new Uint8Array(this.FW * this.FH);\n  ashL = []; ashR = []; emberL = []; emberR = [];\n  explodeTimer = 0;\n  flareBoost = 0;\n  time = 0;\n  handState = { recoilX: 0, recoilY: 0 };\n\n  componentDidMount() {\n    this.playLeft = this.WALL;\n    this.playRight = this.DESIGN_W - this.WALL;\n    this.playBottom = this.DESIGN_H - 84;\n    this.buildPegs();\n    this.resize();\n    this._resizeHandler = () => this.resize();\n    window.addEventListener(\"resize\", this._resizeHandler);\n    this._interval = setInterval(() => this.tick(), 16);\n  }\n\n  componentWillUnmount() {\n    if (this._interval) clearInterval(this._interval);\n    window.removeEventListener(\"resize\", this._resizeHandler);\n  }\n\n  buildPegs() {\n    const rows = 10;\n    const rowGap = (this.playBottom - this.playTop - 60) / rows;\n    const pegs = [];\n    for (let r = 0; r < rows; r++) {\n      const y = this.playTop + 30 + r * rowGap;\n      const cols = r % 2 === 0 ? 8 : 7;\n      const usableW = this.playRight - this.playLeft - 16;\n      const spacing = usableW / (cols - 1 + (r % 2 === 0 ? 0 : 1));\n      const offset = r % 2 === 0 ? 8 : 8 + spacing / 2;\n      for (let c = 0; c < cols; c++) {\n        const x = this.playLeft + offset + c * spacing;\n        if (x < this.playLeft + 6 || x > this.playRight - 6) continue;\n        pegs.push({ x, y, r: 3.6, hit: 0 });\n      }\n    }\n    this.pegs = pegs;\n  }\n\n  resize() {\n    const canvas = this.boardCanvas;\n    if (!canvas) return;\n    const rect = canvas.getBoundingClientRect();\n    const dpr = window.devicePixelRatio || 1;\n    this.scaleFactor = rect.width / this.DESIGN_W;\n    canvas.width = Math.round(rect.width * dpr);\n    canvas.height = Math.round(rect.height * dpr);\n    const ctx = canvas.getContext(\"2d\");\n    ctx.setTransform(dpr * this.scaleFactor, 0, 0, dpr * this.scaleFactor, 0, 0);\n    this.boardCtx = ctx;\n  }\n\n  setRootRef = (el) => { this.rootEl = el; };\n  setBoardRef = (el) => { this.boardCanvas = el; if (el) this.resize(); };\n  setFireLeftRef = (el) => { this.fireLeftCanvas = el; };\n  setFireRightRef = (el) => { this.fireRightCanvas = el; };\n  setLeftHandRef = (el) => { this.leftHandEl = el; };\n  setRightHandRef = (el) => { this.rightHandEl = el; };\n\n  handlePointerDown = (e) => {\n    if (this.state.activeCard || this.state.gameOver || this.state.beads <= 0) return;\n    const canvas = this.boardCanvas;\n    if (!canvas) return;\n    const rect = canvas.getBoundingClientRect();\n    const scale = rect.width / this.DESIGN_W;\n    let x = (e.clientX - rect.left) / scale;\n    x = clamp(x, this.playLeft + 6, this.playRight - 6);\n    this.balls.push({ x, y: 16, vx: (Math.random() - 0.5) * 0.6, vy: 0, r: 5.2, hits: 0, settled: false });\n    this.setState({ beads: this.state.beads - 1, message: \"bead released // descending through the lattice\" });\n  };\n\n  spawnParticles(x, y, color, count) {\n    for (let i = 0; i < count; i++) {\n      const phi = Math.random() * Math.PI * 2;\n      const v = 1 + Math.random() * 2.5;\n      this.particles.push({ x, y, vx: Math.cos(phi) * v, vy: Math.sin(phi) * v - 1.2, color, size: 1.5 + Math.random() * 2, alpha: 1, life: 24 + Math.random() * 20 });\n    }\n  }\n\n  onBeadLanded(gateIdx, ball) {\n    const gate = this.gates[gateIdx];\n    this.spawnParticles(ball.x, this.playBottom, gate.color, 16);\n    this.triggerExplosion(0.5);\n    if (this.state.activeCard || this.state.gameOver) return;\n    let pool = DECK;\n    const drawnNames = this.state.drawnCards.map((c) => c.name);\n    if (gate.label === \"CUPS\") pool = DECK.filter((c) => c.tradition === \"water\");\n    else if (gate.label === \"WANDS\") pool = DECK.filter((c) => c.tradition === \"fire\");\n    else if (gate.label === \"EARTH\") pool = DECK.filter((c) => c.tradition === \"earth\");\n    else if (gate.label === \"AIR\") pool = DECK.filter((c) => c.tradition === \"air\");\n    else if (gate.label === \"COSMOS\") pool = DECK.filter((c) => c.major);\n    let available = pool.filter((c) => !drawnNames.includes(c.name));\n    if (available.length === 0) available = DECK.filter((c) => !drawnNames.includes(c.name));\n    if (available.length === 0) available = DECK;\n    const picked = available[Math.floor(Math.random() * available.length)];\n    const reversed = Math.random() < 0.4;\n    this.setState({\n      activeCard: { ...picked, reversed },\n      revealedActive: false,\n      flyState: \"idle\",\n      message: `landed: gate of ${gate.label.toLowerCase()} // click the card to unravel it`,\n    });\n  }\n\n  evaluateCardEffect(card) {\n    const name = card.name.toLowerCase();\n    const roll = (min, max) => min + Math.floor(Math.random() * (max - min + 1));\n    const isFireAir = card.tradition === \"fire\" || card.tradition === \"air\";\n    const isWaterEarth = card.tradition === \"water\" || card.tradition === \"earth\";\n    const isMajorCurse = name.includes(\"tower\") || name.includes(\"devil\") || name.includes(\"death\");\n    const isMajorBoon = name.includes(\"sun\") || name.includes(\"star\") || name.includes(\"world\") || name.includes(\"fortune\");\n    let effectType = \"neutral\", beadChange = 0, message = \"\";\n    if (isMajorCurse) { effectType = \"curse\"; beadChange = -roll(3, 5); message = `curse: catastrophic interference (${beadChange})`; }\n    else if (isMajorBoon) { effectType = \"buff\"; beadChange = roll(3, 5); message = `buff: cosmic alignment (+${beadChange})`; }\n    else if (card.reversed && isFireAir) { effectType = \"curse\"; beadChange = -roll(2, 3); message = `curse: elemental backlash (${beadChange})`; }\n    else if (card.reversed) { effectType = \"curse\"; beadChange = -roll(1, 2); message = `curse: channels reversed (${beadChange})`; }\n    else if (isFireAir) {\n      if (Math.random() < 0.5) { effectType = \"curse\"; beadChange = -roll(1, 2); message = `curse: elemental strife (${beadChange})`; }\n      else { effectType = \"buff\"; beadChange = roll(1, 3); message = `buff: instant flux (+${beadChange})`; }\n    } else if (isWaterEarth) { effectType = \"buff\"; beadChange = roll(1, 3); message = `buff: flow sustained (+${beadChange})`; }\n    else { effectType = \"buff\"; beadChange = roll(1, 2); message = `buff: resonance harmonized (+${beadChange})`; }\n    return { effectType, beadChange, message };\n  }\n\n  handleUnravel = () => {\n    if (this.state.revealedActive || !this.state.activeCard) return;\n    const card = this.state.activeCard;\n    const { effectType, beadChange, message } = this.evaluateCardEffect(card);\n    const big = Math.abs(beadChange) >= 4;\n    this.flareBoost = big ? 1.6 : 1.0;\n    this.triggerExplosion(big ? 1 : 0.75);\n    this.setState({\n      revealedActive: true,\n      score: this.state.score + Math.max(0, beadChange) * 10 + 25,\n      beads: Math.max(0, this.state.beads + beadChange),\n      message: `drew ${card.name.toLowerCase()} // ${message}`,\n      eyeMode: effectType === \"curse\" ? \"curse\" : \"buff\",\n      shaking: effectType === \"curse\",\n      handHit: beadChange < 0,\n    });\n    setTimeout(() => this.setState({ shaking: false }), 500);\n    if (beadChange < 0) setTimeout(() => this.setState({ handHit: false }), 600);\n    setTimeout(() => {\n      this.setState({ flyState: \"flying\" });\n      setTimeout(() => {\n        const drawn = [...this.state.drawnCards, { ...card, dimColor: effectType === \"curse\" ? \"#c0392b\" : \"#cfc9c0\" }];\n        const nowBeads = this.state.beads;\n        this.setState({\n          drawnCards: drawn,\n          activeCard: null,\n          revealedActive: false,\n          flyState: \"none\",\n          eyeMode: \"normal\",\n          gameOver: nowBeads <= 0,\n          message: nowBeads <= 0 ? \"the conduit runs dry\" : \"the lattice awaits // tap to drop another bead\",\n        });\n      }, 650);\n    }, 1400);\n  };\n\n  restart = () => {\n    this.balls = [];\n    this.particles = [];\n    this.flareBoost = 0;\n    this.setState({\n      beads: (this.props && this.props.startingBeads) || 5,\n      score: 0,\n      message: \"sacred conduit primed // tap the board to drop a bead\",\n      drawnCards: [],\n      activeCard: null,\n      revealedActive: false,\n      flyState: \"none\",\n      gameOver: false,\n      eyeMode: \"normal\",\n      shaking: false,\n    });\n  };\n\n  tickPhysics() {\n    const GRAVITY = 0.52, RESTITUTION = 0.58, FRICTION = 0.993;\n    for (let i = this.balls.length - 1; i >= 0; i--) {\n      const b = this.balls[i];\n      if (b.settled) { this.balls.splice(i, 1); continue; }\n      b.vy += GRAVITY; b.vx *= FRICTION; b.vy *= FRICTION;\n      b.x += b.vx; b.y += b.vy;\n      if (b.x - b.r < this.playLeft) { b.x = this.playLeft + b.r; b.vx = Math.abs(b.vx) * RESTITUTION; b.hits++; }\n      if (b.x + b.r > this.playRight) { b.x = this.playRight - b.r; b.vx = -Math.abs(b.vx) * RESTITUTION; b.hits++; }\n      for (const peg of this.pegs) {\n        const dx = b.x - peg.x, dy = b.y - peg.y;\n        const minDist = b.r + peg.r, distSq = dx * dx + dy * dy;\n        if (distSq < minDist * minDist && distSq > 0.0001) {\n          const dist = Math.sqrt(distSq), nx = dx / dist, ny = dy / dist;\n          const overlap = minDist - dist;\n          b.x += nx * overlap; b.y += ny * overlap;\n          const dot = b.vx * nx + b.vy * ny;\n          b.vx = (b.vx - 2 * dot * nx) * RESTITUTION;\n          b.vy = (b.vy - 2 * dot * ny) * RESTITUTION;\n          b.vx += (Math.random() - 0.5) * 0.35;\n          b.hits++; peg.hit = 1;\n          if (b.hits % 3 === 0) this.setState({ score: this.state.score + 5 });\n        }\n      }\n      if (b.y > this.playBottom) {\n        b.settled = true;\n        const usable = this.playRight - this.playLeft;\n        const gw = usable / this.gates.length;\n        let idx = Math.floor((b.x - this.playLeft) / gw);\n        idx = clamp(idx, 0, this.gates.length - 1);\n        this.onBeadLanded(idx, b);\n      }\n    }\n    for (let i = this.particles.length - 1; i >= 0; i--) {\n      const p = this.particles[i];\n      p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--; p.alpha = Math.max(0, p.life / 40);\n      if (p.life <= 0) this.particles.splice(i, 1);\n    }\n  }\n\n  drawBoard() {\n    const ctx = this.boardCtx;\n    if (!ctx) return;\n    const W = this.DESIGN_W, H = this.DESIGN_H;\n    ctx.clearRect(0, 0, W, H);\n    for (const peg of this.pegs) {\n      peg.hit *= 0.9;\n      ctx.beginPath();\n      ctx.arc(peg.x, peg.y, peg.r + peg.hit * 2, 0, Math.PI * 2);\n      ctx.fillStyle = `rgba(255,255,255,${0.28 + peg.hit * 0.5})`;\n      ctx.fill();\n    }\n    const usable = this.playRight - this.playLeft;\n    const gw = usable / this.gates.length;\n    ctx.font = \"8px ui-monospace, monospace\";\n    ctx.textAlign = \"center\";\n    for (let i = 0; i < this.gates.length; i++) {\n      const gate = this.gates[i];\n      const gx = this.playLeft + i * gw;\n      ctx.strokeStyle = \"rgba(255,255,255,0.12)\";\n      ctx.beginPath(); ctx.moveTo(gx, this.playBottom); ctx.lineTo(gx, this.playBottom + 40); ctx.stroke();\n      ctx.fillStyle = gate.color;\n      ctx.globalAlpha = 0.85;\n      ctx.fillText(gate.label, gx + gw / 2, this.playBottom + 22);\n      ctx.globalAlpha = 1;\n    }\n    ctx.strokeStyle = \"rgba(255,255,255,0.12)\";\n    ctx.beginPath(); ctx.moveTo(this.playRight, this.playBottom); ctx.lineTo(this.playRight, this.playBottom + 40); ctx.stroke();\n    for (const b of this.balls) {\n      ctx.beginPath();\n      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);\n      ctx.fillStyle = \"#e3d9c6\";\n      ctx.shadowColor = \"rgba(227,217,198,0.8)\";\n      ctx.shadowBlur = 8;\n      ctx.fill();\n      ctx.shadowBlur = 0;\n    }\n    for (const p of this.particles) {\n      ctx.globalAlpha = p.alpha;\n      ctx.fillStyle = p.color;\n      ctx.fillRect(p.x, p.y, p.size, p.size);\n      ctx.globalAlpha = 1;\n    }\n  }\n\n  drawFire(canvas, buf, palette, ash, embers, ditherAmt, ditherOffset) {\n    if (!canvas) return;\n    const ctx = canvas.__ctx || (canvas.__ctx = canvas.getContext(\"2d\"));\n    ctx.clearRect(0, 0, this.FW, this.FH);\n    for (let y = 0; y < this.FH; y++) {\n      for (let x = 0; x < this.FW; x++) {\n        const v = buf[y * this.FW + x];\n        if (v <= 0) continue;\n        if (ditherAmt > 0.01) {\n          const bayerVal = BAYER4[(y + ditherOffset) % 4][(x + ditherOffset) % 4] / 16;\n          if (bayerVal < ditherAmt * 0.6) continue;\n        }\n        const rLocal = y - this.SKY_ROWS;\n        const rowT = clamp(rLocal / (this.FLAME_ROWS - 1), 0, 1);\n        ctx.globalAlpha = lerp(0.45, 1, rowT); // heat-shimmer: the tip reads thinner/hazier than the base\n        ctx.fillStyle = palette[v];\n        ctx.fillRect(x, y, 1, 1);\n        ctx.globalAlpha = 1;\n      }\n    }\n    for (const p of ash) {\n      ctx.globalAlpha = p.alpha * 0.8;\n      ctx.fillStyle = p.color;\n      ctx.fillRect(Math.round(p.x), Math.round(p.y), 1, 1);\n    }\n    for (const p of embers) {\n      ctx.globalAlpha = p.alpha;\n      ctx.fillStyle = p.color;\n      if (p.glyph) {\n        ctx.save();\n        ctx.translate(p.x, p.y);\n        ctx.rotate(p.rot);\n        ctx.font = \"3px serif\";\n        ctx.textAlign = \"center\";\n        ctx.textBaseline = \"middle\";\n        ctx.fillText(p.glyph, 0, 0);\n        ctx.restore();\n      } else {\n        ctx.fillRect(Math.round(p.x), Math.round(p.y), 1, 1);\n      }\n    }\n    ctx.globalAlpha = 1;\n  }\n\n  spawnAsh(mid) {\n    const side = Math.random() < 0.5 ? -1 : 1;\n    return { x: mid + (Math.random() - 0.5) * 2, y: this.SKY_ROWS + Math.random() * 6, vx: side * (0.12 + Math.random() * 0.35), vy: -0.06 - Math.random() * 0.1, life: 34 + Math.random() * 26, maxLife: 60, alpha: 1, color: [\"#3a3a3a\", \"#555555\", \"#6b6b6b\"][Math.floor(Math.random() * 3)] };\n  }\n  spawnEmber(mid, colors) {\n    const side = Math.random() < 0.5 ? -1 : 1;\n    return { x: mid + (Math.random() - 0.5) * 1.4, y: this.SKY_ROWS + Math.random() * 5, vx: side * (0.15 + Math.random() * 0.45), vy: -0.08 - Math.random() * 0.12, life: 18 + Math.random() * 16, maxLife: 34, alpha: 1, color: colors[Math.floor(Math.random() * colors.length)] };\n  }\n  spawnMidEmber(mid, colors) {\n    const midRow = this.SKY_ROWS + this.FLAME_ROWS * (0.45 + Math.random() * 0.3);\n    return { x: mid + (Math.random() - 0.5) * 3, y: midRow, vx: (Math.random() - 0.5) * 0.18, vy: -0.18 - Math.random() * 0.22, life: 14 + Math.random() * 14, maxLife: 28, alpha: 1, color: colors[Math.floor(Math.random() * colors.length)] };\n  }\n  spawnBurstParticle(mid, midRow, colors) {\n    const angle = Math.random() * Math.PI * 2;\n    const speed = 0.55 + Math.random() * 1.1;\n    return { x: mid, y: midRow, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 16 + Math.random() * 16, maxLife: 30, alpha: 1, color: colors[Math.floor(Math.random() * colors.length)] };\n  }\n  spawnAshBurst(mid, midRow) {\n    const angle = Math.random() * Math.PI * 2;\n    const speed = 0.25 + Math.random() * 0.6;\n    return { x: mid, y: midRow, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 30 + Math.random() * 30, maxLife: 58, alpha: 1, color: [\"#3a3a3a\", \"#555555\", \"#6b6b6b\", \"#8a8a8a\"][Math.floor(Math.random() * 4)] };\n  }\n  spawnGlyphParticle(mid, midRow, colors) {\n    const angle = Math.random() * Math.PI * 2;\n    const speed = 0.16 + Math.random() * 0.24;\n    const glyph = KABBALIST_GLYPHS[Math.floor(Math.random() * KABBALIST_GLYPHS.length)];\n    return { x: mid, y: midRow, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 0.05, life: 26 + Math.random() * 20, maxLife: 46, alpha: 1, rot: Math.random() * Math.PI * 2, vrot: (Math.random() - 0.5) * 0.3, glyph, color: colors[Math.floor(Math.random() * colors.length)] };\n  }\n  triggerExplosion(strength) {\n    this.explodeTimer = Math.max(this.explodeTimer, strength);\n    const mid = (this.FW - 1) / 2;\n    const midRow = this.SKY_ROWS + this.FLAME_ROWS * 0.55;\n    const palette = PALETTES[this.state.eyeMode] || PALETTES.fire;\n    const colors = [palette[38], palette[32], palette[26], palette[20]];\n    const count = Math.round(24 + strength * 40);\n    for (let i = 0; i < count; i++) {\n      this.emberL.push(this.spawnBurstParticle(mid, midRow, colors));\n      this.emberR.push(this.spawnBurstParticle(mid, midRow, colors));\n    }\n    const ashCount = Math.round(14 + strength * 22);\n    for (let i = 0; i < ashCount; i++) {\n      this.ashL.push(this.spawnAshBurst(mid, midRow));\n      this.ashR.push(this.spawnAshBurst(mid, midRow));\n    }\n    const glyphCount = Math.round(2 + strength * 4);\n    for (let i = 0; i < glyphCount; i++) {\n      this.emberL.push(this.spawnGlyphParticle(mid, midRow, colors));\n      this.emberR.push(this.spawnGlyphParticle(mid, midRow, colors));\n    }\n  }\n\n  tick() {\n    this.time += 1;\n    this.tickPhysics();\n    this.drawBoard();\n\n    const cap = (this.props && this.props.flameCapBeads) || 12;\n    const gameOver = this.state.gameOver;\n    this.flareBoost *= 0.9;\n    const baseT = gameOver ? 0 : clamp(this.state.beads / cap, 0, 1);\n    const effT = gameOver ? 0 : clamp(baseT + this.flareBoost * 0.55, 0, 1.35);\n    const sourceVal = gameOver ? 0 : Math.round(lerp(16, 39, Math.min(1, effT)));\n    const mid = (this.FW - 1) / 2;\n    const palette = PALETTES[this.state.eyeMode] || PALETTES.fire;\n    const emberColors = [palette[38], palette[32], palette[26]];\n\n    this.fireFrameSkip = (this.fireFrameSkip + 1) % 4;\n    if (this.fireFrameSkip === 0) {\n      buildFlameBuffer(this.fireBufL, this.FW, this.FH, this.FLAME_ROWS, this.SKY_ROWS, sourceVal, this.time * 0.09);\n      buildFlameBuffer(this.fireBufR, this.FW, this.FH, this.FLAME_ROWS, this.SKY_ROWS, sourceVal, this.time * 0.11 + 2.1);\n    }\n\n    const ashChance = sourceVal > 0 ? 0.1 : 0;\n    const emberChance = sourceVal > 0 ? 0.22 * (0.3 + effT) : 0;\n    updateParticles(this.ashL, () => this.spawnAsh(mid), ashChance);\n    updateParticles(this.ashR, () => this.spawnAsh(mid), ashChance);\n    updateParticles(this.emberL, () => this.spawnEmber(mid, emberColors), emberChance);\n    updateParticles(this.emberR, () => this.spawnEmber(mid, emberColors), emberChance);\n    updateParticles(this.emberL, () => this.spawnMidEmber(mid, emberColors), sourceVal > 0 ? 0.14 : 0);\n    updateParticles(this.emberR, () => this.spawnMidEmber(mid, emberColors), sourceVal > 0 ? 0.14 : 0);\n\n    this.explodeTimer = Math.max(0, this.explodeTimer - 0.045);\n    this.drawFire(this.fireLeftCanvas, this.fireBufL, palette, this.ashL, this.emberL, this.explodeTimer, this.time);\n    this.drawFire(this.fireRightCanvas, this.fireBufR, palette, this.ashR, this.emberR, this.explodeTimer, this.time + 2);\n\n    const activeCount = this.balls.length;\n    let targetRecoil = 0;\n    if (activeCount > 0) targetRecoil = 3;\n    this.handState.recoilY = lerp(this.handState.recoilY, targetRecoil + Math.sin(this.time * 0.05) * 3, 0.08);\n    if (this.leftHandEl) this.leftHandEl.style.transform = `translateY(${this.handState.recoilY}px)`;\n    if (this.rightHandEl) this.rightHandEl.style.transform = `translateY(${this.handState.recoilY}px)`;\n  }\n\n  getFlameScale() {\n    const cap = (this.props && this.props.flameCapBeads) || 12;\n    const baseT = this.state.gameOver ? 0 : clamp(this.state.beads / cap, 0, 1);\n    const boosted = this.state.gameOver ? 0 : clamp(baseT + this.flareBoost * 0.35, 0, 1.25);\n    return this.state.gameOver ? 0.05 : lerp(0.45, 1.35, boosted);\n  }\n\n  getFlameOpacity() {\n    const cap = (this.props && this.props.flameCapBeads) || 12;\n    const baseT = this.state.gameOver ? 0 : clamp(this.state.beads / cap, 0, 1);\n    return this.state.gameOver ? 0 : lerp(0.25, 1, baseT);\n  }\n\n  renderVals() {\n    const s = this.state;\n    const card = s.activeCard;\n    return {\n      beads: s.beads,\n      score: s.score,\n      message: s.message,\n      drawnCards: s.drawnCards,\n      drawnCardsCount: s.drawnCards.length,\n      gameOver: s.gameOver,\n      hasActiveCard: !!card,\n      isRevealedActive: s.revealedActive,\n      activeCardNum: card ? card.num : \"\",\n      activeCardGlyph: card ? card.glyph : \"\",\n      activeCardName: card ? card.name.toUpperCase() : \"\",\n      activeCardRevTag: card && card.reversed ? \"⟳ inverted\" : \"\",\n      cardBackDisplay: s.revealedActive ? \"none\" : \"flex\",\n      cardFlipTransform: \"none\",\n      cardHint: !s.revealedActive ? \"[ click to unravel ]\" : \"[ aligning bead flow... ]\",\n      cardTransform: s.flyState === \"flying\" ? \"translate3d(-140px,-260px,0) scale(0.15) rotate(-40deg)\" : \"translate3d(0,0,0) scale(1) rotate(0deg)\",\n      cardOpacity: s.flyState === \"flying\" ? 0 : 1,\n      boardCursor: s.activeCard || s.gameOver || s.beads <= 0 ? \"default\" : \"pointer\",\n      shakeAnimStyle: s.shaking ? \"shake-anim 0.4s ease-in-out\" : \"none\",\n      skeletonFilter: s.gameOver ? \"grayscale(1) brightness(0.6)\" : \"none\",\n      handFlashAnim: s.handHit ? \"hand-cringe 0.6s ease-in-out\" : \"none\",\n      flameScale: this.getFlameScale(),\n      flameOpacity: this.getFlameOpacity(),\n      setRootRef: this.setRootRef,\n      setBoardRef: this.setBoardRef,\n      setFireLeftRef: this.setFireLeftRef,\n      setFireRightRef: this.setFireRightRef,\n      setLeftHandRef: this.setLeftHandRef,\n      setRightHandRef: this.setRightHandRef,\n      handlePointerDown: this.handlePointerDown,\n      handleUnravel: this.handleUnravel,\n      restart: this.restart,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
