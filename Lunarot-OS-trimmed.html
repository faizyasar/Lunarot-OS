ful","patient","animal","held"],"The Hermit":["solitary","lantern-holding","withdrawn","inward","alone"],"Wheel of Fortune":["turning","cyclic","fated","indifferent","returning"],Justice:["consequenced","balanced","exacting","clear","answering"],"The Hanged Man":["suspended","inverted","waiting","surrendered","still"],Death:["ending","composting","releasing","transforming","departing"],Temperance:["alchemising","patient","blending","middle","measured"],"The Devil":["bound","shadowed","chained","seduced","refusing to leave"],"The Tower":["struck","collapsing","revealed","sudden","undone"],"The Star":["hoping","wounded-guiding","night-lit","open","visible"],"The Moon":["illusory","subterranean","howling","unclear","dreaming"],"The Sun":["clarified","returned","warm","visible","named"],Judgement:["called","resurrected","answered","awakened","summoned"],"The World":["completed","dancing","encompassed","whole","arrived"],"Ace of Cups":["overflowing","given","opened","held out","beginning"],"Three of Swords":["pierced","grief-clear","through-cut","named at last","honest"],"Five of Cups":["mourning","spilled","backwards-facing","grieving","still counting"],"Ten of Pentacles":["legacy-built","accumulated","inherited","lasting","given forward"],"Page of Wands":["spark-stage","unlit","restless","almost-beginning","bright"],"Knight of Swords":["charging","truth-first","fast","unpausing","cutting through"],"Queen of Cups":["witnessed","empathic","throne-holding","feeling-named","present"],"King of Pentacles":["patient-mastered","solid","earned","unhurried","grounded"],"Seven of Wands":["defended","summit-alone","holding ground","outnumbered","standing"],"Two of Cups":["mirrored","meeting","recognised","offered","mutual"]},H0=["The {sun} carries something {sunAdj}. The {moon} holds something {moonAdj}. What the cards have drawn toward the surface  -  {cardAdj1}, then {cardAdj2}  -  is not new, only finally visible.","Something {sunAdj} in the bones. Something {moonAdj} in the blood. The spread names the space between: {cardAdj1} pressing against {cardAdj2}, the self as its own unfinished argument.","The {sun} arrives {sunAdj}. The {moon} stays {moonAdj}. The three positions reveal what the chart already suspected  -  a {cardAdj1} life navigating a {cardAdj2} world, still translating.","There is something {sunAdj} about the way it begins, and something {moonAdj} about the way it ends. The middle is what the cards name: {cardAdj1}, then {cardAdj2}, then the long silence after."],G0={"The Fool":"The Leap of Faith in esoteric tradition represents stepping into the unknown without attachment. It is the raw, unformed *potential* before creation, the breath of the void preceding form.","The Magician":"The Vessel symbolizes the human body and mind as a channel for divine will. It is the conduit through which celestial energy manifests into the earthly *flesh* and material reality.","The High Priestess":"The Inner Sanctum represents the hidden, esoteric knowledge guarded behind the veil. It is the silent *shadow* space of intuition where the unwritten mysteries are held.","The Empress":"The Holy Mother in mystical traditions is the active, nurturing principle of nature. She embodies the physical *flesh*, the fertile earth, and the divine matrix of all creation.","The Emperor":"The Divine Law signifies the structural order of the universe imposed upon the chaos of the *void*. It is the unyielding framework that governs celestial mechanics and earthly empires.","The Hierophant":"The Initiated Teaching refers to the unbroken lineage of sacred, spoken truths. It represents the *soul* remembering its celestial origins through rigorous orthodox transmission.","The Lovers":"The Holy Covenant is the alchemical marriage of opposites. It signifies the binding of two fractured halves into a perfect union, seeking to repair the original *shadow* of separation.","The Chariot":"Merkabah (Hebrew: מרכבה) Mysticism centers on the ascent to the divine throne. It is the willed discipline of navigating the *void* and mastering the conflicting forces of light and dark.",Strength:"The Greater Jihad (Arabic: جهاد أكبر) is the internal spiritual struggle against the lower self. It represents the quiet taming of one's own feral *flesh* and animalistic instincts.","The Hermit":"The Desert Fathers were early Christian ascetics who retreated into the barren wilderness. It signifies the deliberate isolation from the world to hear the quiet voice of the *soul*.","Wheel of Fortune":"Divine Providence is the inescapable turning of fate's axis. It signifies the underlying, hidden machinery of destiny that operates beyond human *blood* and understanding.",Justice:"The Final Reckoning is the ultimate weighing of the *soul* against the feather of truth. It represents inescapable cosmic equilibrium and the precise balancing of karmic debts.","The Hanged Man":"The Dark Night of the Soul is the painful purgation of the senses. It is the willing suspension in the *abyss* to dissolve old attachments before spiritual rebirth.",Death:'Fanaa (Arabic: فناء) in Sufism is the "passing away" or "annihilation" of the ego and individual self. Often described as "to die before one dies", it represents the complete dissolution of selfish desires into the *void*, leading to a state of ultimate spiritual union.',Temperance:"Tikkun Olam (Hebrew: תיקון עולם) is the Jewish concept of repairing the shattered vessels of creation. It represents the careful alchemical blending required to heal the fractured *soul* of the world.","The Devil":"Ahriman, the Zoroastrian Shadow, is the destructive spirit of falsehood and bondage. It represents the *abyss* of materialism where the spirit becomes chained to its own basest desires.","The Tower":"The Prophetic Strike is the sudden, violent shattering of false structures. It is the divine *flame* that obliterates intellectual pride and built illusions in a single moment.","The Star":"Ahura Mazda's Light is the uncreated, eternal truth of the highest heaven. It represents the distant, pure radiance that guides the *soul* back from the darkness of the material world.","The Moon":"The Veil of Maya (Sanskrit: माया) is the cosmic illusion of the phenomenal world. It represents the deceptive *shadow* realm that obscures the ultimate, undivided reality from mortal eyes.","The Sun":"The Divine Illumination is the sudden, blinding apprehension of absolute truth. It represents the *flame* of pure consciousness dispelling the last remnants of earthly darkness.",Judgement:"The Final Trumpet is the apocalyptic call to awakening. It signifies the resurrection of the true self from the *flesh* and the final assessment of all earthly actions.","The World":"Ein Sof (Hebrew: אֵין סוֹף) is the Infinite, the absolute state before emanation. It represents the *soul* completing its journey and re-merging flawlessly into the boundless, unknowable divine.","Ace of Cups":"Agape (Greek: ἀघापी) is the unconditional, self-sacrificing love of the divine. It represents the pure, overflowing grace that washes away the stains of the mortal *flesh*.","Three of Swords":"The Pierced Heart symbolizes the necessary trauma of disillusionment. It represents the sharp, clarifying pain that opens the *soul* to truths previously obscured by sentiment.","Five of Cups":"The Spilled and Standing represents the tension between irrecoverable loss and remaining grace. It is the heavy *blood* of grief blinding one to the salvation still present.","Ten of Pentacles":"The Living Legacy is the accumulation of generational wisdom and material stability. It represents the deep roots embedded in the earth and the *blood* lineage stretching through time.","Page of Wands":"The Unlit Torch is the nascent spark of divine inspiration before action. It represents the pure, unformed *flame* of potential waiting for the will to ignite it.","Knight of Swords":"Truth at Speed is the ruthless, kinetic pursuit of intellectual clarity. It represents cutting through the *shadow* of ignorance without hesitation or emotional attachment.","Queen of Cups":"The Throne of Empathy is the seat of profound intuitive understanding. It represents the deep, silent *abyss* of the unconscious where all emotional currents are felt and held.","King of Pentacles":"The Patient Empire is the ultimate mastery over the material sphere. It represents the slow, deliberate cultivation of the *flesh* and earth into a lasting, unshakeable sanctuary.","Seven of Wands":"The Defended Summit is the desperate holding of higher ground against opposition. It represents the solitary *flame* of conviction standing firm against the overwhelming tide of the collective.","Two of Cups":"The Mirrored Soul is the profound recognition of the divine in another. It represents the sacred union of opposites, bridging the *void* between two isolated beings."},Yo={"The Fool":"Gluttony","The Magician":"Pride","The High Priestess":"Envy","The Empress":"Lust","The Emperor":"Pride","The Hierophant":"Sloth","The Lovers":"Lust","The Chariot":"Pride",Strength:"Pride","The Hermit":"Sloth","Wheel of Fortune":"Greed",Justice:"Wrath","The Hanged Man":"Sloth",Death:"Wrath",Temperance:"Gluttony","The Devil":"Greed","The Tower":"Wrath","The Star":"Envy","The Moon":"Envy","The Sun":"Pride",Judgement:"Wrath","The World":"Gluttony","Ace of Cups":"Lust","Three of Swords":"Wrath","Five of Cups":"Envy","Ten of Pentacles":"Greed","Page of Wands":"Lust","Knight of Swords":"Wrath","Queen of Cups":"Lust","King of Pentacles":"Greed","Seven of Wands":"Pride","Two of Cups":"Lust"},sh={Pride:{boon:"You are imbued with absolute certainty. The world bends to the weight of your presence, and doubt shatters against your skin.",buff:"You gain a surge of confidence, shielding you from criticism, though it isolates you. You elevate yourself, but the air grows incredibly thin.",curse:"Your vision narrows entirely to your own brilliance. You are blinded by the light of your own making, unable to see the earth rushing to meet you."},Greed:{boon:"The material fabric of the world aligns in your favor. What you reach for is already moving toward your open hands.",buff:"You are granted the sharp, unblinking eye to see opportunity where others see dirt, but you are cursed with the inability to ever feel sated.",curse:"You accumulate without end, but the vessel is cracked. You will possess everything, and it will mean absolutely nothing."},Lust:{boon:"You become a conduit for feral inspiration and visceral attraction. The world is drawn inexorably toward your center.",buff:"You are fueled by a sudden, violent passion that overrides all logic. It is a powerful engine, but it runs entirely on your own blood.",curse:"Obsession eclipses reason. You will be entirely consumed by the object of your fixation, leaving nothing of your original self behind."},Envy:{boon:"You are granted the terrifying ability to see the hidden worth and secret flaws in others, turning comparison into absolute strategic advantage.",buff:"You are driven to outpace your peers, fueled by a dark, competitive venom. It propels you forward, but leaves a bitter taste in your mouth.",curse:"Your own blessings will rot before your eyes, rendered entirely invisible by your fixation on the light of another. You will starve while watching them eat."},Gluttony:{boon:"You possess the terrifying capacity to absorb every experience, metabolizing chaos and turning excess into pure, raw power.",buff:"You are given the endurance to process overwhelming amounts of stress or indulgence without breaking, but you will never know when to stop.",curse:"You are paralyzed by abundance. The flood of your own desires will rise above your head, drowning you in the very things you craved."},Wrath:{boon:"Your anger becomes a precise and holy instrument. It will clear away the dead wood, striking down false idols without consuming your own foundation.",buff:"You are granted unstoppable momentum to annihilate the obstacles in your Running record of Japanese personal websites (個人サイト) from the late 1990s through mid-2000s, focused on occult, horror, and material sharing.

---

## 暗黒工房 (Ankoku Koubou)
* **URL:** http://www.ankokukoubou.com/
* **Status:** ✅ Alive  -  last logged update 2018/5/9
* **Founded:** 1998
* **Author:** maki
* **What it is:** The anchor site. A horror-themed Japanese web resource hub  -  original material (wallpapers, images, fonts), horror games, a tarot divination page, ghost-photo collections, a "scary stories" section. Runs an original Japanese horror font called 「悪夢」("Akumu" / Nightmare). Copyright line reads "all right reserved 1998-2007 maki" but the site itself postdates that, still updating into 2018.
* **Notable:** Has a curating link page (/etc/link/link.htm) that is the gateway to most of this list.

---

## Ghost Tail
* **URL:** http://www.ghosttail.com/
* **Status:** ✅ Alive  -  last logged content update 2015
* **Author:** zen
* **What it is:** Horror material and ghost-story site ("z" branding). Sections for material, horror reading ("JuJu"), horror games, links, usage rules, and an original goods shop. Had a LINE sticker shop tie-in by 2015.
* **Notable:** Has an extensive, categorized link page (occult, fortune-telling, sound effects, web design/CSS tutorials, JS/CGI tutorials)  -  mapping the entire early tech scene.
* **Sub-site:** art.ghosttail.com ("OUT OF THE BOX")  -  high-res horror photo wallpapers.

---

## マイタロウ (Madtaro)
* **Original URL:** http://madtaro.net/ → redirected
* **Current URL:** https://madtaro.x0.com/
* **Status:** ✅ Alive and actively updating (confirmed posts from 2026)
* **Founded:** 1998.7.18
* **What it is:** Solo-author original horror fiction site. Sections for stories, a "monologue" diary, site history, escape-room games, a BBS, and original theme music composed by "MACROGUN." Also running a webcomic adaptation project (「東京区13」).
* **Notable:** Nearly 28 years of continuous operation under one author. One of the strongest "unbroken personal site" examples found.

---

## 9612. (read as "Kreuz")
* **URL:** http://skr.s7.xrea.com/
* **Status:** 🟡 Dormant since 2019, but still standing/served
* **Author:** REITO
* **Founded:** May 2000 (under the name 透明な血 / "Transparent Blood")
* **History:**
  - 2000/05/25  -  started as "透明な血" (Transparent Blood)
  - 2001/05/22  -  closed temporarily due to hospitalization
  - 2001/08/14  -  reopened, renamed "Nervenfaser"
  - 2002/01/10  -  renamed again to final form, "9612."
* **What it is:** Free downloadable web material site (images for web design use)  -  self-described as limited to black/white/gray/red, "dark, maybe empty-systematic" in tone.
* **Notable:** Featured in a 2003 print magazine, "ホームページ激裏大全" (Underground Homepage Compendium). Read aloud as "Kreuz" (German for "cross")  -  visible in folder names.
* **Open thread:** A site at https://kngktk.stars.ne.jp/ has been suggested as REITO's current/another site  -  blocked by robots.txt from automated access, unverified.

---

## TO CHECK NEXT
* 闇恭 (barakyo.com)  -  dark material site
* Caverns Of Blood (cavernsofblood.com)  -  English-language sister site, sound/MIDI/horror fonts
* Blue Moon (blue-moon.sblo.jp)  -  heavy-metal-themed material site with custom BGM
* SILVER EMBLEM (silveremblem.sakura.ne.jp)  -  design credited to "ERIS"
* HANGED MAN (fumio.sugoihp.com)  -  wide range of material under one author
* K.LUV DEPTH GENESIS (kluv-depth.com/hyper/)  -  described by curator as "weird but good"
`,sp=`# Link Web Map

How these sites actually found each other. This is the peer-to-peer social structure of hand-curated link pages that defined early web rings. All links are now clickable.

---

## The Core Chain

*   **[ankokukoubou.com](http://www.ankokukoubou.com/)** (1998, maki)
    *   └─ \`/etc/link/link.htm\` → curated link hub, 4 sub-pages
        *   └─ \`link01.htm\` → "Horror Links" page
            *   ├─ **[madtaro.net](https://madtaro.x0.com/)** (1998 → redirected to [madtaro.x0.com](https://madtaro.x0.com/))
            *   ├─ **[ghosttail.com](http://www.ghosttail.com/)** (zen)
            *   ├─ **[gigas.press.ne.jp](https://web.archive.org/web/20041014022830/http://gigas.press.ne.jp/)** (怨み念法)
            *   ├─ **[neckdoll.jp](https://neckdoll.zombie.jp/)** (人形堂  -  active mirror)
            *   ├─ **[geocities.jp/evil666ring/](https://web.archive.org/web/20040608221532/http://www.geocities.jp:80/evil666ring/)** (THE EVIL DESIGN)
            *   ├─ **[yzero.com](https://web.archive.org/web/20041010072559/http://www.yzero.com/)** (0-zero-)
            *   └─ **[geocities.jp/cyberangelo666/](https://web.archive.org/web/20041014163412/http://www.geocities.jp/cyberangelo666/)** (cyber angelo)

*   **[ghosttail.com](http://www.ghosttail.com/)** (zen)
    *   └─ \`/link/index.html\` → large categorized link page
        *   ├─ **Dark art / material** → **[barakyo.com](https://web.archive.org/web/20040822005018/http://www.barakyo.com/)**, **[cavernsofblood.com](https://web.archive.org/web/20041204085448/http://www.cavernsofblood.com/)**, **[blue-moon.sblo.jp](http://blue-moon.sblo.jp/)**, **[silveremblem.sakura.ne.jp](http://silveremblem.sakura.ne.jp/)**, **[skr.s7.xrea.com](http://skr.s7.xrea.com/)** (9612.), **[fumio.sugoihp.com](https://web.archive.org/web/20040803023223/http://fumio.sugoihp.com/)**
        *   ├─ **Occult / ghost stories** → dozens of horror-story and ghost-photo sites
        *   ├─ **Fonts** → links back to **[ankokukoubou.com/font/](http://www.ankokukoubou.com/font/)** directly
        *   └─ **Web design / CSS / JS tutorials** → the actual technical "syllabus" creators used to learn HTML/CSS/JS (**[tagindex.com](https://www.tagindex.com/)**, **[kent-web.com](https://www.kent-web.com/)**, **[htmq.com](https://www.htmq.com/)**, etc.)

---

## Next Steps
- Map Ghost Tail's full link page systematically (currently only spot-checked)
- Cross-reference which sites appear on multiple hub pages (the most central nodes)
- Check whether any of these maintain active webring badges or scripts

`,cp=`# DEKA / DEKASUPPLYCO / LUNAROTDEKA

Basically I just refuse to make stuff that doesn't look good first lol.

---

## ✦ Inspiration For Art

DEKA never had a mission statement or whatever. It started as a side hobby to kill time, kinda my way into graphic design, and honestly not having a statement is the statement. Like I don't think art needs some deep backstory to matter. Mine's just aesthetic for aesthetic's sake, I've made peace with that lol.

Most of my inspiration comes from ads honestly, but not just that. Typography and all the different visual language watchamacallits feed into it just as much.

---

## ✦ The Formula

I split my style into three things, kinda a suprematist composition: **shape**, **colour**, and **line/text**. Getting a good balance between those three is what makes something feel mine, it's the base formula, the thingy every image runs through whether I'm thinking about it or not.

I'd also call my stuff POP art, playfulness is just part of it. I pull from popular and modern stuff, twisting it up with sources as far apart as ancient Greek statues and modern video games. The source feels limitless to me. Mashing together random assets from different eras on purpose ends up making its own unintentional theme, some feeling that gets charged into the piece almost by accident.

**Stuff I keep coming back to:**
*   Frida Kahlo
*   Duchamp, *Fountain*
*   Kazimir Malevich
*   American art movement, 1960s, consumerism, capitalism, comical nature

DEKA happened because I like the idea of taking old mediums and giving them a new breath. It's just weaving graphic into art, the whole thing comes from loving design, plain and simple.

---

## ✦ Everything That Feeds It

None of this formula showed up fully formed. It came from a bunch of separate things that don't look related to graphic design on the surface, but each one taught my eye something the shape/colour/line formula still runs on, and like I've noticed they all lean on each other more than I first thought.

### The Underlying Wiring
Before I get into the individual watchamacallits below, I wanna jot down why they're all connected in the first place, just for my own record lol. I test as ENFP-A, Assertive Campaigner, 91% Intuitive and 71% Prospecting, which is basically just a fancy way of saying I never wanna settle on one combo when there's a limitless source right there. That's literally why I can mash ancient Greek statues into video games and it doesn't feel weird to me. Appreciation of Beauty and Excellence is my second highest VIA strength, and I reckon that's the real engine behind why I never justify DEKA. Aesthetics don't need a mission statement from me when liking them is already just a core strength. Humour's my top strength actually, and that explains the POP playfulness pretty directly, the comic, twisted-on-purpose vibe I keep chasing. I'm also an Enneagram 4w5, Individualist with an investigative 5 wing, and it splits my stuff kinda down the middle: the 4 wants identity through being unmistakably me, which is basically the whole DEKA thing, and the 5 wing is the quieter instinct behind my hands-on hobby majiggy further down, same investigative pull just aimed at a motherboard instead of a canvas. My Holland Code comes out AES, Artistic first, Enterprising close behind, which maps almost exactly onto DEKA and DEKASUPPLYCO, two sides of the same coin. My EQ stuff fills in the last bit, Social-Awareness and Relationship Management both score highest for me, while Self-Awareness and Self-Management sit lower. That gap actually matters. It's a big part of why the collaborative stuff, the music work, the DEKASUPPLYCO thing, comes so easy to me outward, while the heavier internal stuff gets processed sideways instead, through poetry and dark fiction, rather than head on.

### Paint And Pigment
Before any of it hit a screen, it went through a brush first. I keep traditional painting as its own quieter archive, separate from the commercial DEKA stuff, somewhere the formula gets tested slower and by hand before it's allowed to go fast digitally, same slow-first thing I do with the physical modelling watchamacallit below too. My digital painting goes back even further, to school, honestly the earliest archive I've got, and it's the habit that became my whole DEKA pipeline. Frida Kahlo's unflinching symbolism, Andy Warhol's Pop repetition, and Zaha Hadid's architectural fluidity all sit behind this as references for me, same permission I borrow to treat aesthetics as reason enough on their own. Kahlo especially isn't just a visual reference to me, her honesty is the same register my moral undercurrent draws from further down, just in paint instead of words. A school framework called the Four Frames still shapes how I read my own work back: subjective, cultural, structural, and postmodern, which I've realised is basically just my habit of mashing unrelated sources together on purpose, given a proper name.

### Form, Physical And Digital
My formula didn't start with shape on a screen either. A Diploma of Building Design at TAFE NSW gave me scale, proportion, and construction logic, not that far off from the shape/colour/line balance my stuff runs on. Even earlier, a design tech class at school had me build a 29cm scale model of a sustainable apartment thingy, out of a repurposed political sign and industrial tape, my first real go at turning a sketch into an actual physical object. A failed print halfway through a 3D printing attempt pushed me toward the laser cutter instead, faster, cleaner, worked better with what I had. That same instinct shows up again for me in the WebGPU render work in the Lunarot ecosystem, shader driven star fields and pachinko physics standing in for the hands-on prototypes from way back. Same habit really, turning an idea into something you can actually manipulate, just moved from paper tape to code. It's kinda funny how it sits in tension with my photography further down, which rejects digital cleanliness on purpose while this one embraces it.

### The Competitive Instinct
Not everything feeding into DEKA is visual on its face lol. My competitive gaming, favouring roles built around controlling space, whether that's Reinhardt, Pharah, or Zenyatta in Overwatch, uses the same instinct I use for reading a situation and adapting fast, same shape/colour/line negotiation my formula runs on, just happening live instead of on a canvas. Same goes for messing with custom PC hardware, diagnosing instability through logs, testing components, swapping data lines, recalibrating RAM down to 3200MHz just to force stability out of the thing. Direct echo of the 3D printer troubleshooting and laser cutter pivot above honestly. Even my choice of games ties into my moral undercurrent below, Gambit and Deadlock (I hate deadlock sm) both reward opportunism and betrayal as much as raw skill, same taste for morally grey mechanics I notice in the characters I like.

### The Moral Undercurrent
My playful, pastiche-heavy surface sits on top of a way darker set of interests underneath, and I think the EQ gap above is a big part of why. Like I'm drawn to morally messy lore and deeply flawed characters, Minthara, Griffith, Oberyn Martell, people whose paths get forged through ambition and vengeance and tragic necessity, or the SCP Foundation's whole bureaucratic horror majiggy, and it feeds a taste for stuff that carries more weight than it looks on the surface, same weight I find in Kahlo's work above. My poetry does the same thing from the other direction, dark, atmospheric, honestly an outlet for isolation and shadow and decay that forces proper language onto feelings a purely visual piece can't always hold. Where my self-awareness and self-management score lower, I reckon poetry and dark fiction end up doing that processing sideways for me instead, which is also exactly why this stuff stays private and doesn't really show up in the commercial DEKA output.

### Sound Made Visual
My music taste runs deep into Goth and New Wave, same emotional register as my moral undercurrent above honestly, and it never stays just auditory for me. I treat music as an atmosphere that needs a visual answer, which is exactly why doing visual concepts for producers, including studio stuff based in Parramatta, feels natural to me rather than a side thing, and kinda exactly what my high social scores would predict. Same instinct carries into how I shoot photos too, I reject digital cleanliness on purpose and go for raw 35mm film, heavy grain, muted contrast, soft focus, motion blur. I want imperfect, transient stuff over anything sterile, same imperfection my pastiche relies on to feel alive, same one my physical modelling reached for by hand before this one reached for it through a lens.

---

## ✦ The Three Forms

1.  **DEKA**
    *   *My core thing:* Pure graphics for aesthetic's sake. No backstory or academic justification needed. Straight from the heart lol.
2.  **DEKASUPPLYCO**
    *   *My streetwear thing:* A single-season streetwear label I co-founded, three of us, proper profit-share setup. Streetcar-inspired culture meeting DEKA principles, 300gsm tees and custom plush toys, sourced out of Guangzhou with a full Shopify backend behind it. One season. One run. Something real to point to.
3.  **LUNAROTDEKA**
    *   *My esoteric art thing:* The archive layer I built to bridge visual systems, occult geometry, and brand stuff.

---

*   **Supplier Base:** Guangzhou Sourcing Hub
*   **Core Directive:** Eye-pleasing graphic supremacy
